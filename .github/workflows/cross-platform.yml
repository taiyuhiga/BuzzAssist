name: Cross-platform plugin validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests including isolated Codex and Claude Code setup
        run: npm test
      - name: Build canvas
        run: npm run build
      - name: Verify npm distribution contents
        run: npm pack --dry-run
